<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>webwarden Admin</title>
  <defs>
    <linearGradient id="shield" x1="256" y1="40" x2="256" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5468f0"/>
      <stop offset="1" stop-color="#3b3fc4"/>
    </linearGradient>
    <linearGradient id="gloss" x1="256" y1="40" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Guard shield -->
  <path d="M256 40 L432 104 V236 C432 340 358 422 256 472 C154 422 80 340 80 236 V104 Z"
